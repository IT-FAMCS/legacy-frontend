name: Build & push image

# Авторелиз: на пуш в master/main собираем docker-образ фронта и пушим в GHCR.
# Дальше watchtower на сервере сам подтянет свежий образ и перезапустит контейнер.
# (Раньше этот workflow деплоил на GitHub Pages — теперь деплой на свой сервер через GHCR.)
on:
  push:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          # Пусто => фронт ходит на /api того же домена (caddy проксирует на бэк).
          build-args: |
            VITE_API_BASE_URL=
          tags: |
            ghcr.io/it-famcs/legacy-frontend:latest
            ghcr.io/it-famcs/legacy-frontend:${{ github.sha }}
