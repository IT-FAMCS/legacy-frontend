# Внутренний nginx фронта — только статика SPA + фолбэк.
# HTTPS, домен и маршрутизация /api -> backend делает внешний tickets-caddy.
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # кеш хэшированных ассетов vite
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # SPA-фолбэк: /home, /account, /card/.. -> index.html
    location / {
        try_files $uri /index.html;
    }
}
